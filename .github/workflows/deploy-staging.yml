name: Deploy to Kinsta Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Theme to Kinsta
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH/rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.git' --exclude='.github'
          path: wp-content/themes/rey-london/
          remote_path: ${{ secrets.KINSTA_DEPLOY_PATH }}
          remote_host: ${{ secrets.KINSTA_SSH_HOST }}
          remote_port: ${{ secrets.KINSTA_SSH_PORT }}
          remote_user: ${{ secrets.KINSTA_SSH_USER }}
          remote_key: ${{ secrets.KINSTA_SSH_KEY }}
