<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" fill="none">
  <defs>
    <style>
      .logo-blue { fill: #0A2F8A; }
      .logo-text-main { font-family: 'Georgia', 'Times New Roman', serif; font-weight: 700; font-style: italic; }
      .logo-text-sub { font-family: 'Arial', 'Helvetica', sans-serif; font-weight: 400; letter-spacing: 0.25em; }
    </style>
  </defs>

  <!-- C circle with cross -->
  <g transform="translate(10, 8)">
    <!-- The C arc (open at top-right) -->
    <path d="M 52,6 A 46,46 0 1,0 52,98" stroke="#0A2F8A" stroke-width="8.5" fill="none" stroke-linecap="round"/>
    <!-- Cross vertical -->
    <rect x="33" y="32" width="8" height="40" rx="1" class="logo-blue"/>
    <!-- Cross horizontal -->
    <rect x="17" y="44" width="40" height="8" rx="1" class="logo-blue"/>
  </g>

  <!-- Main text: Chislehurst Pharmacy Group -->
  <text x="128" y="40" class="logo-blue logo-text-main" font-size="33">Chislehurst</text>
  <text x="128" y="74" class="logo-blue logo-text-main" font-size="33">Pharmacy Group</text>

  <!-- Divider line -->
  <line x1="128" y1="85" x2="398" y2="85" stroke="#0A2F8A" stroke-width="1"/>

  <!-- Subtitle: CHISLEHURST · LONDON -->
  <text x="128" y="102" class="logo-blue logo-text-sub" font-size="13">CHISLEHURST</text>
  <text x="260" y="102" class="logo-blue logo-text-sub" font-size="13">·</text>
  <text x="278" y="102" class="logo-blue logo-text-sub" font-size="13">LONDON</text>
</svg>
