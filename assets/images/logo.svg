<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" width="480" height="130">

  <!-- C mark: arc drawn as path with rounded terminals -->
  <path
    d="M 97 26 A 44 44 0 1 0 97 94"
    fill="none"
    stroke="#11368F"
    stroke-width="11"
    stroke-linecap="round"
  />

  <!-- Pharmacy cross: horizontal bar -->
  <rect x="28" y="56" width="32" height="7" rx="3.5" fill="#11368F"/>
  <!-- Pharmacy cross: vertical bar -->
  <rect x="41" y="43" width="7" height="32" rx="3.5" fill="#11368F"/>

  <!-- Wordmark: "Chislehurst" -->
  <text
    x="130"
    y="52"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36"
    font-weight="700"
    fill="#11368F"
    letter-spacing="-0.5"
  >Chislehurst</text>

  <!-- Wordmark: "Pharmacy Group" -->
  <text
    x="130"
    y="92"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36"
    font-weight="700"
    fill="#11368F"
    letter-spacing="-0.5"
  >Pharmacy Group</text>

  <!-- Divider line -->
  <line x1="130" y1="101" x2="410" y2="101" stroke="#11368F" stroke-width="1"/>

  <!-- Subtitle: CHISLEHURST · LONDON -->
  <text
    x="130"
    y="120"
    font-family="Arial, Helvetica, sans-serif"
    font-size="14"
    font-weight="400"
    fill="#11368F"
    letter-spacing="3"
  >CHISLEHURST</text>
  <text
    x="280"
    y="120"
    font-family="Arial, Helvetica, sans-serif"
    font-size="14"
    font-weight="400"
    fill="#11368F"
  >·</text>
  <text
    x="296"
    y="120"
    font-family="Arial, Helvetica, sans-serif"
    font-size="14"
    font-weight="400"
    fill="#11368F"
    letter-spacing="3"
  >LONDON</text>

</svg>
